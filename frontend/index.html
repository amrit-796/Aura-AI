<!DOCTYPE html>
<html>
<head>
    <title>Emotional AI Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: #1e293b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .message {
            margin: 10px 0;
        }

        .user {
            text-align: right;
            color: #38bdf8;
        }

        .ai {
            text-align: left;
            color: #a78bfa;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            width: 75%;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #6366f1;
            color: white;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-box" id="chat"></div>

    <div>
        <input id="input" placeholder="Type your message..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
async function send() {
    let inputBox = document.getElementById("input");
    let chat = document.getElementById("chat");

    let message = inputBox.value;
    if (!message) return;

    chat.innerHTML += `<div class="message user">${message}</div>`;

    inputBox.value = "";

    let res = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    let data = await res.json();

    chat.innerHTML += `<div class="message ai">${data.response}</div>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
